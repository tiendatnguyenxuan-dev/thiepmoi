<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .description {
            color: #666;
            font-size: 0.95rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-number.accept {
            color: #f5576c;
        }

        .stat-number.decline {
            color: #667eea;
        }

        .stat-number.visits {
            color: #f093fb;
        }

        .stat-label {
            color: #888;
            font-size: 1.1rem;
        }

        .data-table {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .actions {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            flex: 1;
            min-width: 200px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-export {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-clear {
            background: linear-gradient(135deg, #dfe9f3 0%, #e0c3fc 100%);
            color: #666;
        }

        .btn-back {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .stat-number {
                font-size: 2rem;
            }

            table {
                font-size: 0.85rem;
            }

            th,
            td {
                padding: 10px 8px;
            }

            button {
                min-width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📊 Analytics Dashboard</h1>
            <p class="description">Dữ liệu tương tác với thiệp mời của bạn</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">👁️ Lượt Xem</div>
                <div class="stat-number visits" id="visitsCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💖 Đồng Ý</div>
                <div class="stat-number accept" id="acceptsCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🙈 Từ Chối</div>
                <div class="stat-number decline" id="declinesCount">0</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">🧀 Cheese Pasta</div>
                <div class="stat-number" style="color: #ffa726;" id="cheeseCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🍜 Food Tour Q5</div>
                <div class="stat-number" style="color: #26c6da;" id="foodTourCount">0</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn-export" onclick="exportToExcel()">
                📥 Xuất Excel
            </button>
            <button class="btn-clear" onclick="clearData()">
                🗑️ Xóa Dữ Liệu
            </button>
            <button class="btn-back" onclick="window.location.href='index.html'">
                ← Về Trang Chính
            </button>
        </div>

        <div class="data-table">
            <h2 style="margin-bottom: 20px; color: #667eea;">Chi Tiết Tương Tác</h2>
            <div id="tableContainer"></div>
        </div>
    </div>

    <script>
        const ANALYTICS_KEY = 'invitation_analytics';

        function getAnalytics() {
            const data = localStorage.getItem(ANALYTICS_KEY);
            return data ? JSON.parse(data) : { accepts: [], declines: [], visits: [] };
        }

        function updateDashboard() {
            const analytics = getAnalytics();

            // Update stats
            document.getElementById('visitsCount').textContent = analytics.visits.length;
            document.getElementById('acceptsCount').textContent = analytics.accepts.length;
            document.getElementById('declinesCount').textContent = analytics.declines.length;

            // Count food choices
            const cheeseCount = analytics.accepts.filter(e => e.foodChoice === 'Cheese Pasta').length;
            const foodTourCount = analytics.accepts.filter(e => e.foodChoice === 'Food Tour Quận 5').length;
            document.getElementById('cheeseCount').textContent = cheeseCount;
            document.getElementById('foodTourCount').textContent = foodTourCount;

            // Combine all events and sort by timestamp
            const allEvents = [
                ...analytics.accepts.map(e => ({ ...e, action: 'Đồng Ý 💖' })),
                ...analytics.declines.map(e => ({ ...e, action: 'Từ Chối 🙈' })),
                ...analytics.visits.map(e => ({ ...e, action: 'Truy Cập 👁️' }))
            ].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            // Render table
            const tableContainer = document.getElementById('tableContainer');

            if (allEvents.length === 0) {
                tableContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>Chưa có dữ liệu</h3>
                        <p>Khi có người tương tác với thiệp, dữ liệu sẽ hiển thị ở đây</p>
                    </div>
                `;
                return;
            }

            tableContainer.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Hành Động</th>
                            <th>Lựa Chọn Món Ăn</th>
                            <th>Thời Gian</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${allEvents.map((event, index) => `
                            <tr>
                                <td>${index + 1}</td>
                                <td>${event.action}</td>
                                <td>${event.foodChoice || '-'}</td>
                                <td>${event.date}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function exportToExcel() {
            const analytics = getAnalytics();

            // Combine all events
            const allEvents = [
                ...analytics.accepts.map(e => ({ ...e, action: 'Đồng Ý' })),
                ...analytics.declines.map(e => ({ ...e, action: 'Từ Chối' })),
                ...analytics.visits.map(e => ({ ...e, action: 'Truy Cập' }))
            ].sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            if (allEvents.length === 0) {
                alert('Chưa có dữ liệu để xuất!');
                return;
            }

            // Create CSV content
            let csv = 'STT,Hành Động,Lựa Chọn Món Ăn,Thời Gian\n';
            allEvents.forEach((event, index) => {
                csv += `${index + 1},"${event.action}","${event.foodChoice || '-'}","${event.date}"\n`;
            });

            // Add summary at the end
            csv += '\n\nTÓM TẮT\n';
            csv += `Tổng Lượt Xem,${analytics.visits.length}\n`;
            csv += `Tổng Đồng Ý,${analytics.accepts.length}\n`;
            csv += `Tổng Từ Chối,${analytics.declines.length}\n`;

            // Download CSV file
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `thiepmoi_analytics_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            console.log('✅ Exported analytics to CSV');
        }

        function clearData() {
            if (confirm('Bạn có chắc muốn xóa toàn bộ dữ liệu? Hành động này không thể hoàn tác!')) {
                localStorage.removeItem(ANALYTICS_KEY);
                updateDashboard();
                alert('Đã xóa dữ liệu thành công!');
            }
        }

        // Initialize dashboard
        updateDashboard();

        // Auto refresh every 5 seconds
        setInterval(updateDashboard, 5000);
    </script>
</body>

</html>
