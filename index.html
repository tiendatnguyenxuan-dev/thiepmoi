<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lời Mời Đặc Biệt 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Splash Screen -->
    <div class="splash-screen" id="splashScreen">
        <div class="splash-content">
            <div class="splash-emoji">💌</div>
            <h1 class="splash-title">Lời Mời Đặc Biệt</h1>
            <p class="splash-subtitle">Nhấn để xem thiệp 🎵</p>
            <button class="splash-button" id="enterBtn">
                <span>Mở Thiệp</span>
                <span class="splash-icon">💖</span>
            </button>
        </div>
    </div>

    <!-- Background Music -->
    <audio id="bgMusic" loop autoplay muted>
        <!-- In Love - Low G -->
        <source src="inlove.mp3" type="audio/mpeg">
        <!-- Backup song -->
        <source src="https://assets.mixkit.co/music/preview/mixkit-romantic-piano-115.mp3" type="audio/mpeg">
    </audio>

    <!-- Music Toggle Button -->
    <button class="music-toggle" id="musicToggle" title="Bật/Tắt nhạc">
        🔊
    </button>

    <div class="container">
        <!-- Floating hearts animation -->
        <div class="hearts">
            <div class="heart"></div>
            <div class="heart"></div>
            <div class="heart"></div>
            <div class="heart"></div>
            <div class="heart"></div>
        </div>

        <!-- Main invitation card -->
        <div class="invitation-card">
            <div class="emoji-top">✨</div>

            <h1 class="title">Lời Mời Đặc Biệt</h1>

            <div class="message">
                <p>Em oiii</p>
                <p class="main-text">Liệu thứ 7 tuần này em có thể đi chơi với anh không 💕</p>
                <p class="signature">Với tất cả sự chân thành...</p>
            </div>

            <div class="buttons-container">
                <button class="btn btn-accept" id="acceptBtn">
                    Đồng ý  💖
                </button>
                <button class="btn btn-decline" id="declineBtn">
                    Từ chối 🙈
                </button>
            </div>

            <div class="sparkles">
                <span class="sparkle">✨</span>
                <span class="sparkle">💫</span>
                <span class="sparkle">⭐</span>
            </div>
        </div>
    </div>

    <!-- Food Choice Modal -->
    <div class="modal" id="foodChoiceModal">
        <div class="modal-content food-choice">
            <div class="celebration">🎉</div>
            <h2>Tuyệt vời! Chọn địa điểm nhé! 🍴</h2>
            <p class="modal-subtitle">Em muốn đi đâu nào?</p>
            <div class="food-options">
                <button class="food-btn" id="cheeseBtn">
                    <span class="food-icon">🧀</span>
                    <span class="food-name">Cheese Pasta</span>
                    
                </button>
                <button class="food-btn" id="foodTourBtn">
                    <span class="food-icon">🍜</span>
                    <span class="food-name">Xem phimmm</span>
                    
                </button>
                <button class="food-btn" id="bothBtn">
                    <span class="food-icon">💝</span>
                    <span class="food-name">Cả haiii luôn</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Final Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="celebration">💖</div>
            <h2>Hẹn gặp lại bạn!</h2>
            <p id="selectedChoice" class="selected-choice"></p>
            <p class="modal-subtitle">Mình sẽ liên lạc với bạn sớm nhất nhé! 🥰</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <!-- Firebase Config -->
    <script src="firebase-config.js"></script>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>

</html>
